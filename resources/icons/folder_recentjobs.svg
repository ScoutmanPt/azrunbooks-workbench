<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Circular history arrow with clock inside -->
  <!-- Outer circular arrow track (light blue ring) -->
  <circle cx="8" cy="8.5" r="6.8" fill="#EEF6FF" stroke="#D0E8FF" stroke-width="0.4"/>
  <!-- Circular arrow (270° arc, blue) -->
  <path d="M8,2 A6.5,6.5 0 1,1 3,10.8" fill="none" stroke="#3794FF" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Arrow head pointing down-left -->
  <polygon points="3,10.8 1.2,8.6 4.6,8.8" fill="#3794FF"/>
  <!-- Inner clock face (white) -->
  <circle cx="8" cy="8.5" r="3.5" fill="#FFFFFF" stroke="#3794FF" stroke-width="0.8"/>
  <!-- Clock hands -->
  <line x1="8" y1="8.5" x2="8" y2="5.8" stroke="#1A6FCC" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="8.5" x2="10.3" y2="8.5" stroke="#3794FF" stroke-width="1" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="8" cy="8.5" r="0.65" fill="#1A6FCC"/>
</svg>
