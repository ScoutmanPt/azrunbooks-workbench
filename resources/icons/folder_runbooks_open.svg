<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Stack with front document pulled out / fanned -->
  <!-- Back document (darkest blue) -->
  <rect x="5.5" y="1" width="9" height="11.5" rx="1" fill="#0E4FA0"/>
  <!-- Middle document (medium blue) - slightly more exposed -->
  <rect x="3" y="2.5" width="9" height="11.5" rx="1" fill="#3794FF"/>
  <!-- White lines on middle doc (visible since front is pulled) -->
  <line x1="4.5" y1="5" x2="11" y2="5" stroke="#FFFFFF" stroke-width="0.6" stroke-linecap="round" opacity="0.5"/>
  <line x1="4.5" y1="6.5" x2="11" y2="6.5" stroke="#FFFFFF" stroke-width="0.6" stroke-linecap="round" opacity="0.3"/>
  <!-- Front document (pulled left + down - being opened/read) -->
  <rect x="-0.5" y="5" width="9" height="11" rx="1" fill="#FFFFFF"/>
  <rect x="-0.5" y="5" width="9" height="11" rx="1" fill="none" stroke="#C0D8F0" stroke-width="0.5"/>
  <!-- Code lines on front -->
  <line x1="1" y1="7.5" x2="7.5" y2="7.5" stroke="#3794FF" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="1" y1="9.5" x2="7.5" y2="9.5" stroke="#3794FF" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="1" y1="11.5" x2="7.5" y2="11.5" stroke="#3794FF" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="1" y1="13.2" x2="5" y2="13.2" stroke="#5AADFF" stroke-width="0.65" stroke-linecap="round" opacity="0.7"/>
</svg>
