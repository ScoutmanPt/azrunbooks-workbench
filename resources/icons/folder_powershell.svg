<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Terminal window body - 10x10, centered at (3,3)→(13,13) -->
  <rect x="3" y="3" width="10" height="10" rx="1.2" fill="#0A2A5E"/>
  <!-- Title bar (medium blue) -->
  <rect x="3" y="3" width="10" height="2.5" rx="1.2" fill="#1A6FCC"/>
  <rect x="3" y="4.5" width="10" height="1" fill="#1A6FCC"/>
  <!-- Window dots -->
  <circle cx="4.5" cy="4.2" r="0.55" fill="#5AADFF" opacity="0.8"/>
  <circle cx="6" cy="4.2" r="0.55" fill="#5AADFF" opacity="0.5"/>
  <!-- > chevron (white) -->
  <line x1="4.5" y1="7" x2="6.3" y2="8.5" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6.3" y1="8.5" x2="4.5" y2="10" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Cursor underline (light blue) -->
  <line x1="7" y1="10" x2="11.5" y2="10" stroke="#5AADFF" stroke-width="1.5" stroke-linecap="round"/>
</svg>
