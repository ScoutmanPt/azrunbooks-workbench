<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Circular history arrow - active/running state -->
  <circle cx="8" cy="8.5" r="6.8" fill="#E0F0FF" stroke="#C0DCFF" stroke-width="0.4"/>
  <!-- Circular arrow (blue, slightly thicker = active) -->
  <path d="M8,2 A6.5,6.5 0 1,1 3,10.8" fill="none" stroke="#1A6FCC" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polygon points="3,10.8 1.2,8.6 4.6,8.8" fill="#1A6FCC"/>
  <!-- Inner clock face (white) -->
  <circle cx="8" cy="8.5" r="3.5" fill="#FFFFFF" stroke="#1A6FCC" stroke-width="0.8"/>
  <!-- Clock hands (slightly different time = running) -->
  <line x1="8" y1="8.5" x2="9.5" y2="6.4" stroke="#1A6FCC" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="8.5" x2="10.3" y2="9.2" stroke="#3794FF" stroke-width="1" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="8" cy="8.5" r="0.65" fill="#1A6FCC"/>
</svg>
