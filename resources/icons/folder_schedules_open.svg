<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Calendar body (white) -->
  <rect x="1.5" y="3.5" width="13" height="12" rx="1.2" fill="#FFFFFF"/>
  <rect x="1.5" y="3.5" width="13" height="12" rx="1.2" fill="none" stroke="#3794FF" stroke-width="0.8"/>
  <!-- Header (lighter blue = open/active) -->
  <rect x="1.5" y="3.5" width="13" height="3.5" rx="1.2" fill="#5AADFF"/>
  <rect x="1.5" y="5.5" width="13" height="1.5" fill="#5AADFF"/>
  <!-- Ring pins -->
  <rect x="4.5" y="2" width="1.2" height="3.5" rx="0.6" fill="#3794FF"/>
  <rect x="10.3" y="2" width="1.2" height="3.5" rx="0.6" fill="#3794FF"/>
  <!-- Date dots - row 1 -->
  <circle cx="4" cy="9.5" r="0.8" fill="#B0D4F8"/>
  <circle cx="6.5" cy="9.5" r="0.8" fill="#B0D4F8"/>
  <circle cx="9" cy="9.5" r="0.8" fill="#B0D4F8"/>
  <circle cx="11.5" cy="9.5" r="0.8" fill="#B0D4F8"/>
  <!-- Date dots - row 2 -->
  <circle cx="4" cy="12.2" r="0.8" fill="#B0D4F8"/>
  <circle cx="6.5" cy="12.2" r="0.8" fill="#B0D4F8"/>
  <!-- Highlighted date -->
  <rect x="8.2" y="10.8" width="3.2" height="3" rx="1" fill="#3794FF"/>
  <circle cx="9.8" cy="12.3" r="0.65" fill="#FFFFFF"/>
</svg>
