<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Terminal window - open/active, 10x10 centered -->
  <rect x="3" y="3" width="10" height="10" rx="1.2" fill="#0E3A7A"/>
  <!-- Title bar (brighter = active) -->
  <rect x="3" y="3" width="10" height="2.5" rx="1.2" fill="#3794FF"/>
  <rect x="3" y="4.5" width="10" height="1" fill="#3794FF"/>
  <!-- Window dots -->
  <circle cx="4.5" cy="4.2" r="0.55" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="6" cy="4.2" r="0.55" fill="#FFFFFF" opacity="0.5"/>
  <!-- Dim code line -->
  <line x1="4.5" y1="6.5" x2="11" y2="6.5" stroke="#5AADFF" stroke-width="0.6" stroke-linecap="round" opacity="0.4"/>
  <!-- > chevron (white) -->
  <line x1="4.5" y1="7.8" x2="6.3" y2="9.3" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6.3" y1="9.3" x2="4.5" y2="10.8" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Cursor underline -->
  <line x1="7" y1="10.8" x2="11.5" y2="10.8" stroke="#7FCCFF" stroke-width="1.5" stroke-linecap="round"/>
</svg>
