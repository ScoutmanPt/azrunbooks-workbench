<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Document -->
  <rect x="2" y="1" width="10" height="13" rx="1" fill="#FFF0F0"/>
  <polygon points="10,1 12,3 10,3" fill="#D89090"/>
  <polygon points="10,1 10,3 12,3" fill="#ECC0C0"/>
  <!-- Graphical Workflow - dark red stripe -->
  <rect x="2" y="1" width="1.8" height="13" rx="0" fill="#B71C1C"/>
  <rect x="2" y="1" width="1.8" height="1" rx="0.8" fill="#B71C1C"/>
  <!-- Code lines -->
  <line x1="5" y1="4.5" x2="11.5" y2="4.5" stroke="#EF9A9A" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
  <line x1="5" y1="7"   x2="11.5" y2="7"   stroke="#EF9A9A" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
  <line x1="5" y1="9.5" x2="8.5"  y2="9.5" stroke="#EF9A9A" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
  <!-- Graph node + chain arrow (graphical workflow) -->
  <circle cx="5.5" cy="13" r="1.1" fill="#B71C1C"/>
  <circle cx="10.5" cy="13" r="1.1" fill="#B71C1C"/>
  <!-- Arrow connection -->
  <line x1="6.6" y1="13" x2="8.8" y2="13" stroke="#B71C1C" stroke-width="1" stroke-linecap="round"/>
  <polyline points="8.2,12 9.4,13 8.2,14" fill="none" stroke="#B71C1C" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
